<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Zigbee 信道干扰分析</title>
<style>
:root{--bg:#0d1117;--panel:#161b22;--card:#1c2333;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--yellow:#d29922;--orange:#db6d28;--red:#f85149}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--panel);border-bottom:1px solid var(--border);height:52px}
.toolbar h1{font-size:17px;font-weight:600}
.toolbar-actions{display:flex;gap:10px;align-items:center}
button{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);cursor:pointer;font-size:13px}
button:hover{background:var(--border)}
.status{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}
.status .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.main{max-width:1200px;margin:0 auto;padding:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:16px}
.card h2{font-size:16px;margin-bottom:14px;font-weight:600}

/* ── 热力图 ── */
.heatmap-container{overflow-x:auto}
.heatmap{border-collapse:collapse}
.heatmap th,.heatmap td{border:1px solid var(--border);text-align:center;padding:0}
.heatmap th{background:var(--panel);font-size:12px;font-weight:500;padding:6px 4px;color:var(--muted)}
.heatmap th.ch{min-width:36px}
.heatmap td.cell{min-width:36px;height:40px;font-size:11px;font-weight:600;cursor:pointer;position:relative;transition:transform .1s}
.heatmap td.cell:hover{transform:scale(1.15);z-index:1;border-color:var(--accent)}
.heatmap td.node-label{background:var(--panel);font-size:12px;padding:4px 8px;white-space:nowrap;color:var(--text)}
.heatmap td.rssi{font-size:10px;color:rgba(255,255,255,.85);text-shadow:0 1px 2px rgba(0,0,0,.6)}

/* WiFi 重叠标记 */
.wifi-row{display:flex;gap:2px;justify-content:center}
.wifi-tag{font-size:9px;padding:1px 4px;border-radius:3px;background:rgba(88,166,255,.15);color:var(--accent);margin:1px}

/* ── 信道推荐 ── */
.rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.rec-card{border:1px solid var(--border);border-radius:6px;padding:12px;background:var(--panel)}
.rec-card .ch-num{font-size:22px;font-weight:700}
.rec-card .ch-info{font-size:12px;color:var(--muted);margin-top:4px}
.rec-card .ch-rssi{font-size:13px;margin-top:4px}
.rec-card.best{border-color:var(--green);background:rgba(63,185,80,.08)}
.rec-card.good{border-color:var(--accent)}
.rec-card.warn{border-color:var(--yellow)}
.rec-card.bad{border-color:var(--red)}

/* ── 告警 ── */
.alert{padding:8px 12px;margin-bottom:6px;border-radius:6px;font-size:12px;border-left:3px solid}
.alert.critical{background:rgba(248,81,73,.1);border-color:var(--red);color:var(--red)}
.alert.warning{background:rgba(210,153,34,.1);border-color:var(--yellow);color:var(--yellow)}

/* ── WiFi 重叠图 ── */
.overlap-section{margin-top:8px}
.overlap-bar{display:flex;height:28px;border-radius:4px;overflow:hidden;margin:4px 0}
.overlap-segment{display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;min-width:20px;transition:opacity .2s;cursor:help}
.overlap-segment:hover{opacity:.8}
.overlap-label{font-size:11px;color:var(--muted);margin-left:8px}

/* ── 趋势图 ── */
.trend-chart{width:100%;height:180px}
.trend-line{fill:none;stroke-width:2}
.trend-area{opacity:.15}
.trend-axis{font-size:10px;fill:var(--muted)}

.empty{color:var(--muted);text-align:center;padding:40px;font-size:14px}

/* 两列布局 */
.two-col{display:grid;grid-template-columns:1fr 340px;gap:16px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="toolbar">
  <h1>📡 Zigbee 信道干扰分析</h1>
  <div class="toolbar-actions">
    <div class="status"><span class="dot"></span><span id="status-text">就绪</span></div>
    <button onclick="loadHeatmap()">🔄 刷新</button>
    <button onclick="injectMock()">🧪 注入模拟数据</button>
  </div>
</div>

<div class="main">
  <!-- 热力图 + 侧边栏 -->
  <div class="two-col">
    <div>
      <!-- 热力图 -->
      <div class="card">
        <h2>🔥 信道干扰热力图</h2>
        <div class="heatmap-container" id="heatmap-container">
          <p class="empty">点击"注入模拟数据"或等 Router 上报 ED Scan</p>
        </div>
      </div>

      <!-- WiFi-Zigbee 重叠图 -->
      <div class="card" id="overlap-card" style="display:none">
        <h2>📶 WiFi - Zigbee 信道重叠</h2>
        <div id="overlap-container"></div>
      </div>

      <!-- 趋势图 -->
      <div class="card" id="trend-card" style="display:none">
        <h2>📈 RSSI 趋势 <span id="trend-label" style="font-size:12px;color:var(--muted)"></span></h2>
        <svg id="trend-svg" class="trend-chart"></svg>
      </div>
    </div>

    <div>
      <!-- 告警 -->
      <div class="card" id="alerts-card">
        <h2>⚠️ 干扰告警</h2>
        <div id="alerts-list"><p class="empty">暂无数据</p></div>
      </div>

      <!-- 信道推荐 -->
      <div class="card" id="rec-card">
        <h2>🎯 信道推荐</h2>
        <div id="rec-container"><p class="empty">暂无数据</p></div>
      </div>

      <!-- 图例 -->
      <div class="card">
        <h2>📋 图例</h2>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px">
          <div style="display:flex;align-items:center;gap:6px"><span style="width:24px;height:16px;border-radius:3px;background:#1a6e3a;display:inline-block"></span>-90~-70 安静</div>
          <div style="display:flex;align-items:center;gap:6px"><span style="width:24px;height:16px;border-radius:3px;background:#3fb950;display:inline-block"></span>-70~-60 轻度</div>
          <div style="display:flex;align-items:center;gap:6px"><span style="width:24px;height:16px;border-radius:3px;background:#d29922;display:inline-block"></span>-60~-50 明显</div>
          <div style="display:flex;align-items:center;gap:6px"><span style="width:24px;height:16px;border-radius:3px;background:#db6d28;display:inline-block"></span>-50~-30 严重</div>
          <div style="display:flex;align-items:center;gap:6px"><span style="width:24px;height:16px;border-radius:3px;background:#f85149;display:inline-block"></span>&gt;-30 极强</div>
          <div style="display:flex;align-items:center;gap:6px"><span style="width:24px;height:16px;border-radius:3px;background:#21262d;display:inline-block"></span>未扫描</div>
        </div>
        <div style="margin-top:10px;font-size:11px;color:var(--muted)">
          <b>Zigbee 推荐信道:</b> 25 (最远离 WiFi), 15, 20<br>
          <b>避免:</b> 与 WiFi 6/11 重叠的 16-19, 21-24
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const API = `http://${location.host}/api/channel`;

// ── RSSI → 颜色 ──
function rssiColor(rssi) {
  if (rssi === null || rssi === undefined || rssi < -95) return '#21262d';
  if (rssi >= -30) return '#f85149';
  if (rssi >= -50) return '#db6d28';
  if (rssi >= -60) return '#d29922';
  if (rssi >= -70) return '#3fb950';
  return '#1a6e3a';
}

function rssiLabel(rssi) {
  if (rssi < -95) return '';
  return rssi;
}

// ── 热力图渲染 ──
function renderHeatmap(data) {
  const container = document.getElementById('heatmap-container');
  const channels = data.channels || [];
  const nodes = data.nodes || [];
  const matrix = data.matrix || [];

  if (!nodes.length) {
    container.innerHTML = '<p class="empty">暂无 ED Scan 数据</p>';
    return;
  }

  let html = '<table class="heatmap">';

  // Header: 信道号
  html += '<tr><th></th>';
  channels.forEach(ch => {
    html += `<th class="ch">${ch}</th>`;
  });
  html += '</tr>';

  // 数据行
  nodes.forEach((nwk, rowIdx) => {
    const nodeType = (data.node_types || {})[nwk] || '';
    const typeIcon = nodeType === 'Coordinator' ? '🟢' : nodeType === 'Router' ? '🔵' : '🟡';
    html += `<tr><td class="node-label">${typeIcon} ${nwk}</td>`;

    channels.forEach((ch, colIdx) => {
      const rssi = matrix[rowIdx] ? matrix[rowIdx][colIdx] : -100;
      const color = rssiColor(rssi);
      const label = rssiLabel(rssi);
      html += `<td class="cell rssi" style="background:${color}" 
                  data-node="${nwk}" data-channel="${ch}" data-rssi="${rssi}"
                  onclick="showTrend('${nwk}',${ch})"
                  title="${nwk} Ch${ch}: ${rssi}dBm">${label}</td>`;
    });
    html += '</tr>';
  });

  // WiFi 重叠行
  html += '<tr><td class="node-label" style="font-size:10px;color:var(--muted)">WiFi干扰</td>';
  const wifiMap = data.zigbee_wifi_map || {};
  channels.forEach(ch => {
    const wifis = wifiMap[ch] || [];
    if (wifis.length) {
      const short = wifis.map(w => w.replace(/WiFi (\d+).*/, 'W$1')).join(',');
      html += `<td class="cell" style="background:rgba(88,166,255,.12);font-size:9px;color:var(--accent)">${short}</td>`;
    } else {
      html += '<td class="cell" style="background:rgba(63,185,80,.08)"></td>';
    }
  });
  html += '</tr>';

  html += '</table>';
  container.innerHTML = html;

  // 渲染告警
  renderAlerts(data.alerts || []);
  // 渲染推荐
  renderRecommendations(data.recommendations || []);
  // 渲染 WiFi 重叠图
  renderOverlap(data);
}

// ── 告警 ──
function renderAlerts(alerts) {
  const el = document.getElementById('alerts-list');
  if (!alerts.length) {
    el.innerHTML = '<p class="empty">无干扰告警 ✅</p>';
    return;
  }
  el.innerHTML = alerts.map(a =>
    `<div class="alert ${a.severity}">${a.message}</div>`
  ).join('');
}

// ── 信道推荐 ──
function renderRecommendations(recs) {
  const el = document.getElementById('rec-container');
  if (!recs.length) {
    el.innerHTML = '<p class="empty">暂无数据</p>';
    return;
  }

  const top6 = recs.slice(0, 6);
  el.innerHTML = '<div class="rec-grid">' + top6.map(r => {
    let cls = '';
    if (r.rank.includes('最佳')) cls = 'best';
    else if (r.rank.includes('次优')) cls = 'good';
    else if (r.rank.includes('不推荐')) cls = 'bad';
    else if (r.rank.includes('可用')) cls = 'warn';

    return `<div class="rec-card ${cls}">
      <div class="ch-num">Ch ${r.channel}</div>
      <div style="font-size:13px">${r.rank}</div>
      <div class="ch-rssi">RSSI: ${r.rssi} dBm</div>
      <div class="ch-info">评分: ${r.score}</div>
    </div>`;
  }).join('') + '</div>';
}

// ── WiFi-Zigbee 重叠图 ──
function renderOverlap(data) {
  const card = document.getElementById('overlap-card');
  card.style.display = 'block';
  const container = document.getElementById('overlap-container');

  const overlap = data.wifi_overlap || {};
  const channels = data.channels || [];
  const matrix = data.matrix || [];
  const nodes = data.nodes || [];

  // 计算每个信道的平均 RSSI
  const chAvgRssi = {};
  channels.forEach((ch, i) => {
    const values = matrix.map(row => row[i]).filter(v => v > -95);
    chAvgRssi[ch] = values.length ? values.reduce((a,b)=>a+b,0)/values.length : -90;
  });

  let html = '';
  // WiFi 信道条
  const wifiChannels = Object.keys(overlap);
  const colors = ['#58a6ff','#bc8cff','#f778ba','#ff7b72','#ffa657','#d2a8ff','#79c0ff','#7ee787'];

  wifiChannels.forEach((wifi, idx) => {
    const zigbeeChs = overlap[wifi];
    const color = colors[idx % colors.length];
    const wifiNum = wifi.match(/\d+/)?.[0] || '';

    // 构建条形
    let barHtml = '';
    const chWidth = 100 / channels.length;
    channels.forEach(ch => {
      const isOverlap = zigbeeChs.includes(ch);
      if (isOverlap) {
        const rssi = chAvgRssi[ch] || -90;
        const intensity = Math.min(1, Math.max(0.2, (rssi + 90) / 60));
        barHtml += `<div class="overlap-segment" style="flex:1;background:${color};opacity:${intensity}" 
                     title="WiFi ${wifiNum} → Ch ${ch}: ${Math.round(rssi)}dBm">${ch}</div>`;
      } else if (barHtml) {
        // 已有内容但这个不是重叠，留个极窄间隔
      }
    });

    html += `<div style="display:flex;align-items:center;margin:3px 0">
      <span class="overlap-label" style="min-width:70px;font-size:11px">WiFi ${wifiNum}</span>
      <div class="overlap-bar" style="flex:1">${barHtml || '<div style="flex:1"></div>'}</div>
    </div>`;
  });

  container.innerHTML = html;
}

// ── 趋势图 ──
async function showTrend(nodeNwk, channel) {
  const card = document.getElementById('trend-card');
  card.style.display = 'block';
  document.getElementById('trend-label').textContent = `节点 ${nodeNwk} / 信道 ${channel}`;

  try {
    const resp = await fetch(`${API}/trend?node_nwk=${encodeURIComponent(nodeNwk)}&channel=${channel}&count=30`);
    const data = await resp.json();
    renderTrendChart(data);
  } catch (e) {
    console.error('趋势数据获取失败', e);
  }
}

function renderTrendChart(data) {
  const svg = d3.select('#trend-svg');
  svg.selectAll('*').remove();

  const points = data.data_points || [];
  if (points.length < 2) {
    svg.append('text').attr('x', '50%').attr('y', '50%').attr('text-anchor', 'middle')
       .attr('fill', '#8b949e').attr('font-size', '13px').text('数据点不足');
    return;
  }

  const container = svg.node().parentElement;
  const W = container.clientWidth;
  const H = 180;
  const margin = {top: 20, right: 20, bottom: 30, left: 45};
  const w = W - margin.left - margin.right;
  const h = H - margin.top - margin.bottom;

  svg.attr('viewBox', [0, 0, W, H]);
  const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  const x = d3.scaleLinear().domain([0, points.length - 1]).range([0, w]);
  const y = d3.scaleLinear().domain([-95, -25]).range([h, 0]);

  // 网格
  const yGrid = d3.axisLeft(y).ticks(5).tickSize(-w).tickFormat('');
  g.append('g').attr('class', 'trend-axis').call(yGrid)
    .selectAll('line').attr('stroke', '#30363d');

  // 零干扰线
  [-50, -60, -70].forEach(v => {
    g.append('line').attr('x1', 0).attr('x2', w).attr('y1', y(v)).attr('y2', y(v))
     .attr('stroke', v === -50 ? '#f8514940' : '#30363d').attr('stroke-dasharray', '4,4');
    g.append('text').attr('x', -5).attr('y', y(v)).attr('dy', '-3px')
     .attr('text-anchor', 'end').attr('font-size', '9px').attr('fill', '#8b949e').text(`${v}dBm`);
  });

  // 面积
  const area = d3.area()
    .x((d, i) => x(i))
    .y0(h)
    .y1(d => y(d.rssi))
    .curve(d3.curveMonotoneX);

  g.append('path').datum(points)
    .attr('class', 'trend-area')
    .attr('d', area)
    .attr('fill', '#58a6ff');

  // 线
  const line = d3.line().x((d, i) => x(i)).y(d => y(d.rssi)).curve(d3.curveMonotoneX);
  g.append('path').datum(points)
    .attr('class', 'trend-line')
    .attr('d', line)
    .attr('stroke', '#58a6ff');

  // 点
  g.selectAll('circle').data(points).join('circle')
    .attr('cx', (d, i) => x(i)).attr('cy', d => y(d.rssi))
    .attr('r', 3).attr('fill', '#58a6ff').attr('stroke', '#0d1117').attr('stroke-width', 1.5);

  // X轴
  g.append('g').attr('transform', `translate(0,${h})`)
    .call(d3.axisBottom(x).ticks(Math.min(points.length, 10)).tickFormat(i => {
      if (i >= 0 && i < points.length) {
        return points[Math.floor(i)].timestamp?.substring(11, 16) || '';
      }
      return '';
    }).tickSize(0))
    .selectAll('text').attr('class', 'trend-axis').attr('font-size', '9px');

  // Y轴
  g.append('g').call(d3.axisLeft(y).ticks(5).tickFormat(d => `${d}dBm`).tickSize(0))
    .selectAll('text').attr('class', 'trend-axis').attr('font-size', '9px');
}

// ── API 调用 ──
async function loadHeatmap() {
  document.getElementById('status-text').textContent = '加载中...';
  try {
    const resp = await fetch(`${API}/heatmap`);
    const data = await resp.json();
    renderHeatmap(data);
    document.getElementById('status-text').textContent = `${(data.nodes||[]).length} 节点`;
  } catch (e) {
    document.getElementById('status-text').textContent = '加载失败';
    console.error(e);
  }
}

async function injectMock() {
  try {
    await fetch(`${API}/mock-scan`, {method: 'POST'});
    await loadHeatmap();
  } catch (e) {
    console.error(e);
  }
}

// ── 自动刷新 ──
setInterval(loadHeatmap, 15000);
</script>
</body>
</html>
